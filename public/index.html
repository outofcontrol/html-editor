<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.7.2/tinymce.min.js"></script>
	<style>
		body,
		html {
			height: 100%;
			margin: 0;
			overflow: hidden;
		}

		.panes {
			display: flex;
			gap: 10px;
			height: 100vh;
			box-sizing: border-box;
			padding: 5px;
		}

		.panes > div {
			flex: 1 1 0;
			min-width: 0;
			display: flex;
			flex-direction: column;
		}

		textarea {
			flex: 1 1 auto;
			width: 100%;
			min-height: 0;
		}

		/* TinyMCE replaces the textarea with this wrapper; make it fill the column */
		.panes > div > .tox-tinymce {
			flex: 1 1 auto;
			min-height: 0;
		}
	</style>
</head>
<body>
	<div class="panes">
		<div><textarea id="previewCode" class="previewCode" name="previewCode"></textarea></div>
		<div><textarea id="sourceCode" class="sourceCode"></textarea></div>
	</div>
	<script>
		tinymce.init({
	      selector: "#previewCode",
          element_format: 'html',
		  forced_root_block: 'p',
		  force_br_newlines: true,
		  fix_list_elements: true,
          paste_auto_cleanup_on_paste: true,
            paste_postprocess: function (pl, o) {
				// Replace text within pasted content example
                // o.node.innerHTML = o.node.innerHTML.replace(/\<\/a\>/ig, "</a>");

				// Remove specific attributes - Thanks Google
				let allElements = o.node.querySelectorAll('*');
				allElements.forEach(function (element) {
					element.removeAttribute('dir');
					element.removeAttribute('role');
					element.removeAttribute('aria-level');
				});

				// Remove empty tags
				allElements.forEach(function (el) {
					if (el.nodeType === 1 && !el.firstChild) {
						// If the element is empty (no children), remove it
						el.parentNode.removeChild(el);
					} else if (el.nodeType === 1 && el.innerText.trim() === '' && el.children.length === 0) {
						// If the element has no text content and no child elements, remove it
						el.parentNode.removeChild(el);
					}
				});

				// Remove p tags within li tags
				var nodeList = o.node.querySelectorAll('li p');
				nodeList.forEach(function (node) {
					while (node.firstChild) {
						node.parentNode.insertBefore(node.firstChild, node);
					}
					node.parentNode.removeChild(node);
				});
            },
	      menubar: false,
          height: '100%',
          width: '100%',
	      toolbar: ["code | undo redo | bold italic underline | codeinline | styleselect | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | link image | table"],
	      plugins: "code image lists link table",
				table_default_styles: {},
				table_default_attributes: {},
				table_class_list: [
					{ title: 'None', value: '' },
					{ title: 'Table', value: 'table' }
				],
				table_row_class_list: [
					{ title: 'None', value: '' },
					{ title: 'Intermission', value: 'intermission' },
				],
				table_advtab: false,
	      setup: function(ed) {
	        ed.on('init', function() {
	          ed.formatter.register('codeinline', { inline: 'code' });
	        });

	        var wrapInCode = function() {
	          ed.formatter.toggle('codeinline');
	        };

	        ed.ui.registry.addToggleButton('codeinline', {
	          text: 'Code',
	          tooltip: 'Wrap selection in <code> (Ctrl+E)',
	          onAction: wrapInCode,
	          onSetup: function(api) {
	            var changed = ed.formatter.formatChanged('codeinline', function(state) {
	              api.setActive(state);
	            });
	            return function() { changed.unbind(); };
	          }
	        });

	        ed.addShortcut('ctrl+e', 'Wrap selection in <code>', wrapInCode);

	        ed.on('change', function(e) {
	          updateSource(ed.getContent());
	        });

	        ed.on('keyup', function(e) {
	          updateSource(ed.getContent());
	        });
	      }
		});

		function updateSource(content) {
			var code = document.querySelector('#sourceCode');
			code.value = content;
		}

		function updatePreview(content) {
			var sourceCode = document.querySelector('#sourceCode').value;
			tinymce.get('previewCode').setContent(sourceCode);
		}

		document.querySelector('#sourceCode').addEventListener('keyup', updatePreview);
	</script>

</body>
</html>
